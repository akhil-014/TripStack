name: Capstone Test Pipeline

on:
  workflow_dispatch:

jobs:

  ui-tests:
    name: UI Tests - Playwright
    runs-on: ubuntu-latest

    defaults:
      run:
        working-directory: ui-testing

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Create .env
        run: |
          cat <<EOF > .env
          BASE_URL=${{ secrets.BASE_URL }}
          BOB_PASSWORD=${{ secrets.BOB_PASSWORD }}
          CARD_NUMBER=${{ secrets.CARD_NUMBER }}
          CARD_EXPIRY=${{ secrets.CARD_EXPIRY }}
          CARD_CVV=${{ secrets.CARD_CVV }}
          EOF

      - name: Install Dependencies
        run: npm ci

      - name: Install Playwright Browsers
        run: npx playwright install --with-deps chromium

      - name: Run Playwright Tests
        run: npx playwright test

      - name: Upload Playwright Report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: playwright-report
          path: |
            ui-testing/playwright-report
            ui-testing/test-results

  api-tests:
    name: API Tests - Maven + Allure
    runs-on: ubuntu-latest

    defaults:
      run:
        working-directory: api-testing

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Java
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: 22

      - name: Cache Maven
        uses: actions/cache@v4
        with:
          path: ~/.m2/repository
          key: ${{ runner.os }}-maven-${{ hashFiles('api-testing/pom.xml') }}

      - name: Create .env
        run: |
          cat <<EOF > .env
          TRIPSTACK_BASE_URL=${{ secrets.TRIPSTACK_BASE_URL }}
          TRIPSTACK_BOB_PASSWORD=${{ secrets.TRIPSTACK_BOB_PASSWORD }}
          EOF

      - name: Execute API Tests
        run: mvn clean test

      - name: Upload Allure Results
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: allure-results
          path: api-testing/allure-results

      - name: Upload Test Reports
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: api-test-reports
          path: |
            api-testing/target/surefire-reports
            api-testing/test-output

  performance-tests:
    name: Performance Tests - K6
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - uses: grafana/setup-k6-action@v1

      - name: Install Chromium
        run: |
          sudo apt-get update
          sudo apt-get install -y chromium-browser || sudo apt-get install -y chromium

      - name: Run SeatMap Browser Test
        env:
          K6_BROWSER_HEADLESS: true
        run: |
          k6 run \
            --summary-export=seatmap-summary.json \
            performance/seatmap-browser.js

      - name: Upload K6 Results
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: performance-results
          path: seatmap-summary.json