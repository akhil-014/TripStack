name: SeatMap Performance

on:
  workflow_dispatch:

jobs:
  performance-gate:
    runs-on: ubuntu-latest

    timeout-minutes: 10

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup k6
        uses: grafana/setup-k6-action@v1

      - name: Run SeatMap Render Test
        run: |
          k6 run performance/seatmap-browser.js

      - name: Upload Performance Results
        uses: actions/upload-artifact@v4
        with:
          name: seatmap-performance
          path: seatmap-summary.json